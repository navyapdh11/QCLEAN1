apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: sealed-secrets
      version: "2.x.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami-charts
        namespace: kube-system
  targetNamespace: kube-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: bitnami-charts
  namespace: kube-system
spec:
  interval: 1h
  url: https://charts.bitnami.com/bitnami
